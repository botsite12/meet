<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Meet vũ trụ - Mesh Network</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* (Giữ nguyên toàn bộ CSS từ phiên bản trước) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        /* Nền vũ trụ */
        .space-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #0d0d2b, #000000);
            z-index: -2;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: transparent;
            animation: starMove 60s linear infinite;
        }

        .stars::after, .stars::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            background-image: 
                radial-gradient(2px 2px at 15px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 72px 430px, #ffe6f0, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 550px 210px, #fff0b5, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 890px 620px, #b3d9ff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 120px 920px, #ffb3d9, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 350px 150px, #b3ffb3, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 780px 350px, #ffccb3, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 1000px 800px, #dab3ff, rgba(0,0,0,0)),
                radial-gradient(5px 5px at 450px 600px, #ffb3b3, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 300px 300px;
            opacity: 0.8;
        }

        .stars::before {
            background-image: 
                radial-gradient(2px 2px at 250px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 520px 150px, #ffe6f0, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 80px 700px, #fff0b5, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 940px 250px, #b3d9ff, rgba(0,0,0,0)),
                radial-gradient(4px 4px at 600px 400px, #ffb3d9, rgba(0,0,0,0));
            background-size: 200px 200px;
            opacity: 0.6;
            animation: twinkle 3s ease-in-out infinite alternate;
        }

        @keyframes starMove {
            0% { transform: translate(0,0); }
            100% { transform: translate(-30px,-30px); }
        }

        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 0.9; }
        }

        /* Overlay đăng nhập */
        .login-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .login-card {
            background: rgba(20,20,50,0.7);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 50px 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px rgba(156,227,255,0.2) inset;
            max-width: 400px;
            width: 90%;
        }

        .login-card h2 {
            font-size: 32px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff, #c3a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 16px;
        }

        #googleSignInDiv {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* Màn hình tạo / tham gia phòng */
        .room-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 900;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .room-card {
            background: rgba(20,20,50,0.8);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            max-width: 450px;
            width: 90%;
        }

        .room-card h3 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #fff;
        }

        .room-card input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 60px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            outline: none;
        }

        .room-card input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .room-actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .room-btn {
            background: #7d4aff;
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .room-btn.secondary {
            background: rgba(255,255,255,0.15);
        }

        .room-btn:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* App chính */
        .app {
            display: none;
            height: 100vh;
            backdrop-filter: blur(2px);
            flex-direction: column;
        }

        .room-info {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .room-id-display {
            background: rgba(255,255,255,0.1);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .room-id-display i {
            margin-right: 8px;
            color: #a975ff;
        }

        .leave-room-btn {
            background: rgba(255,80,80,0.3);
            border: 1px solid rgba(255,80,80,0.5);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }

        .leave-room-btn:hover {
            background: rgba(255,80,80,0.6);
        }

        .main-content {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .video-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .video-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            align-content: center;
            margin-bottom: 20px;
            overflow-y: auto;
            padding: 10px;
        }

        .video-tile {
            position: relative;
            background: rgba(20,20,50,0.4);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            aspect-ratio: 16/9;
        }

        .glow-border::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                #ff00cc, #3333ff, #00ff99, #ff00cc, #3333ff);
            background-size: 400% 400%;
            border-radius: 24px;
            z-index: -1;
            animation: glowing 10s ease infinite;
            filter: blur(5px);
            opacity: 0.7;
        }

        @keyframes glowing {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .video-tile video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .participant-name {
            position: absolute;
            bottom: 10px;
            left: 15px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 6px 15px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 2;
        }

        .mic-off-icon {
            position: absolute;
            bottom: 10px;
            right: 15px;
            background: rgba(255,80,80,0.7);
            backdrop-filter: blur(4px);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 2;
        }

        .controls {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            width: fit-content;
        }

        .control-btn {
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .shine-button::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-25deg);
            transition: left 0.7s ease;
        }

        .shine-button:hover::after {
            left: 150%;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }

        .control-btn.end-call {
            background: #ea4335;
            width: 56px;
            height: 56px;
            font-size: 24px;
        }

        .control-btn.end-call:hover {
            background: #c5221f;
        }

        .chat-panel {
            width: 340px;
            background: rgba(10,10,25,0.7);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 16px;
        }

        .pulse-glow {
            animation: pulseGlow 2s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)) drop-shadow(0 0 15px rgba(106,90,205,0.4)); }
            50% { filter: drop-shadow(0 0 10px rgba(255,255,255,0.6)) drop-shadow(0 0 30px rgba(138,43,226,0.8)); }
            100% { filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)) drop-shadow(0 0 15px rgba(106,90,205,0.4)); }
        }

        .chat-header i {
            color: #a975ff;
            font-size: 22px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 16px;
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(145deg, #4158D0, #C850C0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
        }

        .message-bubble {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            padding: 10px 14px;
            border-radius: 20px 20px 20px 5px;
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            word-break: break-word;
            max-width: 220px;
        }

        .message-bubble .name {
            font-weight: 600;
            color: #c3a0ff;
            margin-bottom: 4px;
            font-size: 13px;
        }

        .message-bubble .text {
            color: #f0f0f0;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            border-radius: 40px;
            padding: 6px 6px 6px 18px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .chat-input-area input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        .chat-input-area button {
            background: #7d4aff;
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-input-area button:hover {
            background: #6a3ad6;
            transform: scale(1.05);
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 360px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            z-index: 10;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="space-bg"></div>
    <div class="stars"></div>

    <!-- Overlay đăng nhập -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>🚀 Phòng họp vũ trụ</h2>
            <p>Đăng nhập bằng Google để tiếp tục</p>
            <div id="googleSignInDiv"></div>
        </div>
    </div>

    <!-- Overlay tạo / tham gia phòng -->
    <div id="roomOverlay" class="room-overlay">
        <div class="room-card">
            <h3>🚀 Vào phòng họp</h3>
            <input type="text" id="roomIdInput" placeholder="Nhập mã phòng (để trống nếu tạo phòng mới)">
            <div class="room-actions">
                <button class="room-btn" id="joinRoomBtn">Tham gia</button>
                <button class="room-btn secondary" id="createRoomBtn">Tạo phòng mới</button>
            </div>
        </div>
    </div>

    <!-- App chính -->
    <div class="app" id="mainApp">
        <div class="room-info">
            <div class="room-id-display"><i class="fas fa-hashtag"></i> Mã phòng: <span id="roomIdSpan">---</span></div>
            <div class="leave-room-btn" id="leaveRoomBtn"><i class="fas fa-sign-out-alt"></i> Rời phòng</div>
        </div>

        <div class="main-content">
            <div class="video-area">
                <div class="video-grid" id="videoGrid"></div>
                <div class="controls">
                    <button class="control-btn shine-button" id="micBtn"><i class="fas fa-microphone"></i></button>
                    <button class="control-btn shine-button" id="camBtn"><i class="fas fa-video"></i></button>
                    <button class="control-btn shine-button" id="screenShareBtn"><i class="fas fa-desktop"></i></button>
                    <button class="control-btn shine-button" id="chatToggleBtn"><i class="fas fa-comment"></i></button>
                    <button class="control-btn end-call shine-button" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
                </div>
            </div>

            <div class="chat-panel">
                <div class="chat-header">
                    <i class="fas fa-comment-dots pulse-glow"></i>
                    <span>Tin nhắn</span>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <input type="text" placeholder="Nhập tin nhắn..." id="chatInput">
                    <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>

        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Đăng xuất Google</button>
    </div>

    <script>
        // --- Cấu hình ---
        const CLIENT_ID = '381679579915-0lgk09kdi5qqqd9p5t39rreme2f55ano.apps.googleusercontent.com'; // Client ID của bạn

        // --- Biến toàn cục ---
        let userProfile = null;
        let peer = null;
        let localStream = null;
        let currentRoomId = null;
        let isRoomCreator = false;
        
        // Danh sách peer trong phòng (key: peerId, value: { call, connection, stream, name })
        let peers = {};

        // --- Google Sign-In ---
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredentialResponse,
                auto_select: false,
                cancel_on_tap_outside: true
            });
            google.accounts.id.renderButton(
                document.getElementById('googleSignInDiv'),
                { theme: 'outline', size: 'large', text: 'signin_with', shape: 'pill' }
            );
        };

        function handleCredentialResponse(response) {
            console.log('Đăng nhập thành công:', response);
            const payload = parseJwt(response.credential);
            userProfile = {
                name: payload.name,
                email: payload.email,
                picture: payload.picture
            };
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('roomOverlay').style.display = 'flex';
        }

        function parseJwt(token) {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
            return JSON.parse(jsonPayload);
        }

        // --- Tạo / tham gia phòng ---
        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const roomId = generateRoomId();
            document.getElementById('roomIdInput').value = roomId;
            joinRoom(roomId, true);
        });

        document.getElementById('joinRoomBtn').addEventListener('click', () => {
            const roomId = document.getElementById('roomIdInput').value.trim();
            if (!roomId) {
                alert('Vui lòng nhập mã phòng!');
                return;
            }
            joinRoom(roomId, false);
        });

        function generateRoomId() {
            return 'room-' + Math.random().toString(36).substring(2, 8);
        }

        async function joinRoom(roomId, creator) {
            currentRoomId = roomId;
            isRoomCreator = creator;
            document.getElementById('roomOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('roomIdSpan').textContent = roomId;

            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });

                // Khởi tạo peer
                if (creator) {
                    peer = new Peer(roomId); // Người tạo có ID cố định là roomId
                } else {
                    peer = new Peer(); // ID ngẫu nhiên
                }

                peer.on('open', (id) => {
                    console.log('PeerJS ID của tôi:', id);
                    addLocalVideo(localStream, userProfile.name);

                    // Lắng nghe cuộc gọi đến
                    peer.on('call', (call) => {
                        call.answer(localStream);
                        handleIncomingCall(call);
                    });

                    // Lắng nghe kết nối dữ liệu
                    peer.on('connection', (conn) => {
                        handleDataConnection(conn);
                    });

                    // Nếu là người tham gia, kết nối đến người tạo (roomId)
                    if (!creator) {
                        // Kết nối đến người tạo để xin danh sách peer
                        const conn = peer.connect(roomId);
                        conn.on('open', () => {
                            // Gửi thông tin của mình
                            conn.send({
                                type: 'join',
                                peerId: id,
                                name: userProfile.name
                            });
                        });
                        handleDataConnection(conn, true);
                    }
                });

                peer.on('error', (err) => {
                    console.error('PeerJS error:', err);
                    alert('Lỗi kết nối: ' + err.type);
                });

            } catch (err) {
                console.error('Không thể lấy camera/mic:', err);
                alert('Không thể truy cập camera/microphone. Vui lòng kiểm tra quyền.');
            }
        }

        // --- Xử lý cuộc gọi đến ---
        function handleIncomingCall(call) {
            const peerId = call.peer;
            call.on('stream', (remoteStream) => {
                // Nếu đã có peer này rồi thì cập nhật stream
                if (peers[peerId]) {
                    peers[peerId].stream = remoteStream;
                } else {
                    peers[peerId] = { call, stream: remoteStream, name: `Peer ${peerId.substring(0,5)}` };
                }
                addRemoteVideo(remoteStream, peerId, peers[peerId].name);
            });
            call.on('close', () => {
                removeRemoteVideo(peerId);
                delete peers[peerId];
            });
        }

        // --- Xử lý kết nối dữ liệu ---
        function handleDataConnection(conn, isOutgoing = false) {
            conn.on('open', () => {
                console.log('Data connection opened với', conn.peer);
                if (!peers[conn.peer]) {
                    peers[conn.peer] = { connection: conn };
                } else {
                    peers[conn.peer].connection = conn;
                }
            });

            conn.on('data', (data) => {
                console.log('Nhận data:', data);
                if (data.type === 'chat') {
                    addChatMessage(data.message, data.senderName);
                } else if (data.type === 'join') {
                    // Có người mới tham gia (chỉ người tạo mới nhận được)
                    if (isRoomCreator) {
                        const newPeerId = data.peerId;
                        const newPeerName = data.name;

                        // Gửi danh sách các peer hiện tại cho người mới
                        const peerList = Object.keys(peers).filter(id => id !== newPeerId && id !== peer.id);
                        conn.send({
                            type: 'peerList',
                            peers: peerList.map(id => ({ peerId: id, name: peers[id].name }))
                        });

                        // Thông báo cho tất cả các peer cũ về người mới
                        for (let pid in peers) {
                            if (pid !== newPeerId && peers[pid].connection) {
                                peers[pid].connection.send({
                                    type: 'newPeer',
                                    peerId: newPeerId,
                                    name: newPeerName
                                });
                            }
                        }

                        // Lưu thông tin người mới
                        peers[newPeerId] = { name: newPeerName };
                    }
                } else if (data.type === 'peerList') {
                    // Nhận danh sách peer từ người tạo (chỉ người tham gia mới nhận)
                    const peerList = data.peers;
                    // Gọi đến từng peer trong danh sách
                    peerList.forEach(p => {
                        callPeer(p.peerId, p.name);
                    });
                } else if (data.type === 'newPeer') {
                    // Có peer mới vào phòng, cần gọi đến họ
                    callPeer(data.peerId, data.name);
                }
            });

            if (isOutgoing) {
                // Gửi tên của mình
                conn.send({
                    type: 'userInfo',
                    name: userProfile.name
                });
            }
        }

        // --- Gọi đến một peer khác (tạo cuộc gọi video và data) ---
        function callPeer(peerId, remoteName) {
            if (peerId === peer.id) return; // không gọi chính mình
            if (peers[peerId] && peers[peerId].call) return; // đã có cuộc gọi

            const call = peer.call(peerId, localStream);
            call.on('stream', (remoteStream) => {
                if (!peers[peerId]) peers[peerId] = {};
                peers[peerId].call = call;
                peers[peerId].stream = remoteStream;
                peers[peerId].name = remoteName;
                addRemoteVideo(remoteStream, peerId, remoteName);
            });
            call.on('close', () => {
                removeRemoteVideo(peerId);
                delete peers[peerId];
            });

            // Tạo data connection
            const conn = peer.connect(peerId);
            conn.on('open', () => {
                if (!peers[peerId]) peers[peerId] = {};
                peers[peerId].connection = conn;
                // Gửi tên của mình
                conn.send({
                    type: 'userInfo',
                    name: userProfile.name
                });
            });
            handleDataConnection(conn, true);
        }

        // --- Thêm video local ---
        function addLocalVideo(stream, name) {
            const videoGrid = document.getElementById('videoGrid');
            const tileId = 'local';
            if (document.getElementById(`tile-${tileId}`)) return;

            const tile = document.createElement('div');
            tile.id = `tile-${tileId}`;
            tile.className = 'video-tile glow-border';
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.muted = true;
            video.playsInline = true;
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'participant-name';
            nameDiv.innerHTML = `${name} <i class="fas fa-circle" style="color: #4caf50; font-size: 10px;"></i>`;
            
            tile.appendChild(video);
            tile.appendChild(nameDiv);
            videoGrid.appendChild(tile);
        }

        // --- Thêm video remote ---
        function addRemoteVideo(stream, peerId, name) {
            const videoGrid = document.getElementById('videoGrid');
            if (document.getElementById(`tile-${peerId}`)) return;

            const tile = document.createElement('div');
            tile.id = `tile-${peerId}`;
            tile.className = 'video-tile glow-border';
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            
            const nameDiv = document.createElement('div');
            nameDiv.className = 'participant-name';
            nameDiv.textContent = name;
            
            tile.appendChild(video);
            tile.appendChild(nameDiv);
            videoGrid.appendChild(tile);
        }

        // --- Xóa video remote ---
        function removeRemoteVideo(peerId) {
            const tile = document.getElementById(`tile-${peerId}`);
            if (tile) tile.remove();
        }

        // --- Thêm tin nhắn chat ---
        function addChatMessage(text, senderName) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = senderName.charAt(0).toUpperCase();
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = `<div class="name">${senderName}</div><div class="text">${text.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- Gửi tin nhắn chat ---
        document.getElementById('sendChatBtn').addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            addChatMessage(msg, userProfile.name);

            // Gửi cho tất cả các peer qua data connection
            for (let pid in peers) {
                if (peers[pid].connection) {
                    peers[pid].connection.send({
                        type: 'chat',
                        message: msg,
                        senderName: userProfile.name
                    });
                }
            }

            input.value = '';
        });

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('sendChatBtn').click();
            }
        });

        // --- Điều khiển mic/camera ---
        let micEnabled = true;
        let camEnabled = true;

        document.getElementById('micBtn').addEventListener('click', () => {
            if (localStream) {
                localStream.getAudioTracks().forEach(track => {
                    track.enabled = !track.enabled;
                });
                micEnabled = !micEnabled;
                document.getElementById('micBtn').innerHTML = micEnabled ? '<i class="fas fa-microphone"></i>' : '<i class="fas fa-microphone-slash"></i>';
            }
        });

        document.getElementById('camBtn').addEventListener('click', () => {
            if (localStream) {
                localStream.getVideoTracks().forEach(track => {
                    track.enabled = !track.enabled;
                });
                camEnabled = !camEnabled;
                document.getElementById('camBtn').innerHTML = camEnabled ? '<i class="fas fa-video"></i>' : '<i class="fas fa-video-slash"></i>';
            }
        });

        // --- Rời phòng ---
        document.getElementById('leaveRoomBtn').addEventListener('click', leaveRoom);
        document.getElementById('endCallBtn').addEventListener('click', leaveRoom);

        function leaveRoom() {
            // Đóng tất cả kết nối
            for (let pid in peers) {
                if (peers[pid].call) peers[pid].call.close();
                if (peers[pid].connection) peers[pid].connection.close();
            }
            peers = {};

            // Xóa tất cả video tile (trừ local)
            const videoGrid = document.getElementById('videoGrid');
            while (videoGrid.firstChild) {
                videoGrid.removeChild(videoGrid.firstChild);
            }

            // Dừng local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }

            // Đóng peer
            if (peer) {
                peer.destroy();
                peer = null;
            }

            // Quay lại màn hình tạo phòng
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('roomOverlay').style.display = 'flex';
            document.getElementById('roomIdInput').value = '';
        }

        // --- Đăng xuất Google ---
        document.getElementById('logoutBtn').addEventListener('click', () => {
            google.accounts.id.disableAutoSelect();
            if (document.getElementById('mainApp').style.display === 'flex') {
                leaveRoom();
            }
            document.getElementById('roomOverlay').style.display = 'none';
            document.getElementById('loginOverlay').style.display = 'flex';
        });

        // --- Chia sẻ màn hình (giữ nguyên) ---
        document.getElementById('screenShareBtn').addEventListener('click', async () => {
            try {
                const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const videoTrack = screenStream.getVideoTracks()[0];
                
                if (localStream) {
                    const oldTrack = localStream.getVideoTracks()[0];
                    localStream.removeTrack(oldTrack);
                    localStream.addTrack(videoTrack);
                    
                    // Thay track trong tất cả các cuộc gọi
                    for (let pid in peers) {
                        if (peers[pid].call) {
                            const sender = peers[pid].call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'video');
                            if (sender) {
                                sender.replaceTrack(videoTrack);
                            }
                        }
                    }
                }
            } catch (err) {
                console.error('Không thể chia sẻ màn hình:', err);
            }
        });
    </script>
</body>
